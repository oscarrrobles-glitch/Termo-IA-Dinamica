/* ═══ CyclePad Enhanced v2 ═══ */
/* ═══════════════════════════════════════════════════
   CyclePad Enhanced v2 — Mejoras visuales
   ═══════════════════════════════════════════════════ */
:root {
  --bg: #f0f4fa;
  --panel: #ffffff;
  --border: #d8e2ef;
  --text: #0f172a;
  --muted: #5a6a82;
  --primary: #1d56d4;
  --danger: #dc2626;
  --success: #16a34a;
  --panel-shadow: 0 2px 8px rgba(0,0,0,.07);
  --radius: 10px;
  --transition: .15s ease;
}

/* ── Header con gradiente ── */
.app-header {
  background: linear-gradient(135deg,#1d56d4 0%,#1040cc 100%);
  color:white; padding:10px 16px; border-radius:var(--radius);
  margin-bottom:14px; border-bottom:none;
  box-shadow:0 4px 12px rgba(29,86,212,.3);
}
.app-header h1{color:white;font-size:18px;font-weight:700}
.app-header .subtitle{color:rgba(255,255,255,.75)}
.app-header .mode-btn{border-color:rgba(255,255,255,.4);color:white}
.app-header .mode-btn:hover{background:rgba(255,255,255,.15)}
.app-header .mode-btn.on{background:rgba(255,255,255,.25);border-color:white}
.app-header .btn-ghost{background:rgba(255,255,255,.12);color:white;border-color:rgba(255,255,255,.3)}
.app-header .btn-ghost:hover{background:rgba(255,255,255,.22)}
.app-header select,.app-header .hdr-mdot input{
  background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);color:white}
.app-header select option{background:#1540a8;color:white}

/* ── Paneles ── */
.panel{box-shadow:var(--panel-shadow);transition:box-shadow var(--transition)}
.panel:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}

/* ── Botones ── */
.btn{transition:all var(--transition);font-weight:500}
.btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.15)}
.btn:active{transform:translateY(0)}

/* ── Tabla mejorada ── */
.tech-table tbody tr:nth-child(even) td{background:rgba(0,0,0,.025)}
.tech-table tbody tr:hover td{background:rgba(37,99,235,.06)}

/* ── Summary card ── */
.summary-card{
  background:linear-gradient(135deg,#eff6ff 0%,#e8f0fe 100%);
  border-color:#bfdbfe}

/* ── Hint ── */
.hint{background:linear-gradient(90deg,#f0f9ff,transparent);
  border-left:3px solid #0ea5e9;padding:5px 10px;
  border-radius:0 6px 6px 0;font-size:12px}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:6px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ── Footer ── */
.app-footer{background:var(--panel);border-radius:10px;padding:10px 16px;
  margin-top:12px;border-top:none;box-shadow:var(--panel-shadow)}

/* ══════════════════════════════════════
   MODAL DE PLANTILLAS / EJEMPLOS
   ══════════════════════════════════════ */
.tpl-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:999;backdrop-filter:blur(3px);
  animation:fadeIn .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.tpl-modal{
  background:#fff;color:var(--text);
  border-radius:16px;box-shadow:0 24px 64px rgba(0,0,0,.25);
  width:820px;max-width:96vw;max-height:90vh;
  display:flex;flex-direction:column;overflow:hidden;
  animation:slideUp .2s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

.tpl-header{
  padding:16px 22px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between}
.tpl-header-left h2{margin:0;font-size:16px;font-weight:700;color:var(--primary)}
.tpl-header-left p{margin:3px 0 0;font-size:12px;color:var(--muted)}
.tpl-close{border:none;background:#f1f5f9;border-radius:8px;
  width:30px;height:30px;cursor:pointer;font-size:15px;color:var(--muted);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tpl-close:hover{background:var(--border);color:var(--text)}

/* Tabs */
.tpl-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 22px}
.tpl-tab{border:none;background:none;padding:10px 18px;font-size:13px;font-weight:600;
  cursor:pointer;color:var(--muted);border-bottom:3px solid transparent;
  transition:all .15s;margin-bottom:-1px}
.tpl-tab:hover{color:var(--primary)}
.tpl-tab.active{color:var(--primary);border-bottom-color:var(--primary)}

.tpl-body{padding:16px 22px;overflow-y:auto;flex:1}

/* Grids */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}

.tpl-card{
  border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;cursor:pointer;transition:all .18s ease;
  background:#fff;display:flex;flex-direction:column;gap:5px}
.tpl-card:hover{border-color:var(--primary);
  box-shadow:0 4px 16px rgba(29,86,212,.12);transform:translateY(-2px)}
.tpl-card.example{border-color:#d1fae5}
.tpl-card.example:hover{border-color:#16a34a;box-shadow:0 4px 16px rgba(22,163,74,.12)}

.tpl-icon{font-size:24px;line-height:1}
.tpl-name{font-size:13px;font-weight:700;color:var(--text)}
.tpl-desc{font-size:11px;color:var(--muted);line-height:1.4}
.tpl-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tpl-badge{font-size:10px;font-weight:600;padding:1px 7px;
  border-radius:8px;text-transform:uppercase;letter-spacing:.04em}
.badge-fluid{background:#dbeafe;color:#1d4ed8}
.badge-si{background:#d1fae5;color:#065f46}
.badge-en{background:#fef3c7;color:#92400e}
.badge-closed{background:#f3e8ff;color:#6b21a8}
.badge-open{background:#e0f2fe;color:#075985}
.badge-solved{background:#d1fae5;color:#065f46}

.tpl-results-preview{
  background:#f8fafc;border:1px solid var(--border);border-radius:6px;
  padding:6px 8px;margin-top:5px;font-size:10px;color:var(--muted)}
.tpl-results-preview strong{color:var(--primary);font-size:11px}

/* ══ Botones header ══ */
#ej-btn{
  background:rgba(255,255,255,.18)!important;
  border:1.5px solid rgba(255,255,255,.4)!important;
  color:white!important;border-radius:6px;padding:5px 10px;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
#ej-btn:hover{background:rgba(255,255,255,.28)!important}

#print-btn{
  background:rgba(255,255,255,.12)!important;
  border:1.5px solid rgba(255,255,255,.3)!important;
  color:white!important;border-radius:6px;padding:5px 8px;
  font-size:13px;cursor:pointer;transition:all .15s}
#print-btn:hover{background:rgba(255,255,255,.22)!important}

/* ══ COP panel ══ */
.cop-panel{
  background:linear-gradient(135deg,#f0fdf4,#ecfdf5);
  border:2px solid #6ee7b7;border-radius:10px;
  padding:10px 14px;margin-bottom:12px}
.cop-title{font-size:12px;font-weight:700;color:#065f46;
  margin-bottom:6px;display:flex;align-items:center;gap:6px}
.cop-row{display:flex;justify-content:space-between;
  font-size:12px;padding:2px 0;border-bottom:1px dashed #a7f3d0}
.cop-row span{color:var(--muted)}
.cop-row strong{color:#065f46}
.cop-row.highlight strong{font-size:15px;color:#047857}

/* ══ Print ══ */
@media print{
  .float-palette,.toolbar,.mode-bar,#ej-btn,#print-btn,
  .btn-ghost,.calc-overlay,.palette,.col-right button{display:none!important}
  body{background:white}
  .panel{box-shadow:none;border:1px solid #ccc}
  .app-header{background:white!important;color:black!important;
    border-bottom:2px solid #1d56d4;box-shadow:none}
  .app-header h1,.app-header .subtitle{color:black!important}
}


/* ═══ Análisis de Sensibilidad ═══ */
/* ══════════════════════════════════════════════════
   Análisis de Sensibilidad — CyclePad Enhanced
   ══════════════════════════════════════════════════ */
#sens-btn {
  background: linear-gradient(135deg, #7c3aed, #6d28d9);
  color: #fff; border: none; border-radius: 8px;
  padding: 6px 14px; font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 2px 6px rgba(109,40,217,.35);
  transition: opacity .15s;
}
#sens-btn:hover { opacity: .88; }

.sens-backdrop {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  z-index: 9200; display: flex; align-items: center; justify-content: center;
}
.sens-modal {
  background: #fff; border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.35);
  width: min(900px, 96vw); max-height: 92vh;
  overflow: hidden; display: flex; flex-direction: column;
  font-family: system-ui, sans-serif;
}
.sens-hdr {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: #fff; padding: 14px 20px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.sens-hdr h2 { margin: 0; font-size: 16px; font-weight: 700; }
.sens-hdr p  { margin: 2px 0 0; font-size: 12px; opacity: .85; }
.sens-close-btn {
  background: rgba(255,255,255,.2); border: none; color: #fff;
  width: 28px; height: 28px; border-radius: 50%; font-size: 16px;
  cursor: pointer; line-height: 28px; text-align: center;
  transition: background .15s; flex-shrink: 0;
}
.sens-close-btn:hover { background: rgba(255,255,255,.35); }

.sens-body { overflow-y: auto; padding: 16px 20px; flex: 1; }

/* ── Dos paneles: Dependiente | Independiente ── */
.sens-panels {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  margin-bottom: 14px;
}
.sens-panel {
  border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;
  background: #fafafe;
}
.sens-panel-title {
  font-size: 12px; font-weight: 700; color: #4f46e5;
  text-transform: uppercase; letter-spacing: .04em;
  margin-bottom: 10px; border-bottom: 1px solid #e0e7ff; padding-bottom: 6px;
}
.sens-field { margin-bottom: 8px; }
.sens-field label { font-size: 12px; color: #475569; display: block; margin-bottom: 3px; font-weight: 600; }
.sens-select, .sens-input {
  width: 100%; padding: 5px 8px; border: 1px solid #cbd5e1;
  border-radius: 6px; font-size: 13px; background: #fff;
  box-sizing: border-box;
}
.sens-select:focus, .sens-input:focus {
  outline: none; border-color: #7c3aed;
  box-shadow: 0 0 0 2px rgba(124,58,237,.15);
}
.sens-range-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sens-radio-row { display: flex; align-items: center; gap: 14px; font-size: 13px; margin: 6px 0 0; }
.sens-radio-row label { display: flex; align-items: center; gap: 4px; cursor: pointer; color: #374151; }

/* ── Lista de análisis ── */
.sens-list-section { margin-bottom: 14px; }
.sens-list-title {
  font-size: 12px; font-weight: 700; color: #475569;
  margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em;
}
.sens-list {
  min-height: 60px; max-height: 120px; overflow-y: auto;
  border: 1px solid #e2e8f0; border-radius: 8px; background: #f8fafc;
}
.sens-list-item {
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 6px;
  transition: background .1s;
}
.sens-list-item:last-child { border-bottom: none; }
.sens-list-item:hover { background: #ede9fe; }
.sens-list-item.active { background: #ddd6fe; font-weight: 600; }
.sens-list-item .sens-item-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #7c3aed; flex-shrink: 0;
}
.sens-list-empty {
  padding: 12px; text-align: center; color: #94a3b8; font-size: 12px; font-style: italic;
}

/* ── Área del gráfico ── */
.sens-chart-section { margin-bottom: 14px; }
.sens-chart-wrapper {
  border: 1px solid #e2e8f0; border-radius: 10px;
  background: #fafafe; padding: 4px;
  min-height: 260px; display: flex; align-items: center; justify-content: center;
}
.sens-chart-wrapper canvas { max-width: 100%; display: block; }
.sens-chart-placeholder {
  color: #94a3b8; font-size: 13px; text-align: center; padding: 40px;
}

/* ── Barra de botones ── */
.sens-footer {
  display: flex; gap: 8px; padding: 12px 20px;
  border-top: 1px solid #f1f5f9; flex-shrink: 0; flex-wrap: wrap;
}
.sens-btn-run {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  color: #fff; border: none; border-radius: 7px;
  padding: 7px 18px; font-size: 13px; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.sens-btn-run:hover { opacity: .88; }
.sens-btn-sec {
  background: #f1f5f9; color: #374151; border: 1px solid #e2e8f0;
  border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer;
  transition: background .15s;
}
.sens-btn-sec:hover { background: #e2e8f0; }
.sens-btn-danger {
  background: #fff1f2; color: #be123c; border: 1px solid #fecdd3;
  border-radius: 7px; padding: 7px 14px; font-size: 13px; cursor: pointer;
}
.sens-btn-danger:hover { background: #ffe4e6; }
.sens-status {
  margin-left: auto; font-size: 12px; color: #64748b;
  align-self: center; font-style: italic;
}
.sens-progress {
  width: 100%; height: 3px; background: #e2e8f0;
  border-radius: 2px; margin-top: 4px; overflow: hidden;
  display: none;
}
.sens-progress-bar {
  height: 100%; background: linear-gradient(90deg,#7c3aed,#4f46e5);
  width: 0%; transition: width .1s linear;
}

/* ── Cargar diseño en la app ── */
function loadDesign(data) {
  const input = document.querySelector('input[type=file][accept*=json]');
  if (!input) {
    alert('Primero inicie un diseño haciendo clic en "OK" en el diálogo de inicio. Luego intente cargar el ejemplo.');
    return;
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const file = new File([blob], 'design.cyclepad.json', {type:'application/json'});
  const dt = new DataTransfer();
  dt.items.add(file);
  const orig = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'files');
  Object.defineProperty(input, 'files', {value: dt.files, configurable: true});
  input.dispatchEvent(new Event('change', {bubbles: true}));
  setTimeout(() => { try { Object.defineProperty(input, 'files', orig); } catch(e){} }, 200);
  closeTplModal();
}

/* ── Modal ── */
let tplModalEl = null;
let activeTab = 'examples';  // start on examples tab

function buildCard(item) {
  const card = document.createElement('div');
  card.className = 'tpl-card' + (item.type === 'example' ? ' example' : '');

  const badgeHtml = item.badges.map(b => {
    let cls = 'tpl-badge ';
    if (b==='Agua'||b==='Aire') cls+='badge-fluid';
    else if (b==='SI') cls+='badge-si';
    else if (b==='English') cls+='badge-en';
    else if (b.includes('cerrado')||b==='Sistema') cls+='badge-closed';
    else if (b==='Resuelto') cls+='badge-solved';
    else cls+='badge-open';
    return `<span class="${cls}">${b}</span>`;
  }).join('');

  card.innerHTML = `
    <div class="tpl-icon">${item.icon}</div>
    <div class="tpl-name">${item.name}</div>
    <div class="tpl-desc">${item.desc}</div>
    <div class="tpl-badges">${badgeHtml}</div>
    ${item.results ? `<div class="tpl-results-preview"><strong>📊 Resultados:</strong> ${item.results}</div>` : ''}
  `;
  card.addEventListener('click', () => loadDesign(item.data));
  return card;
}

function openTplModal() {
  if (tplModalEl) { tplModalEl.remove(); tplModalEl = null; }

  const backdrop = document.createElement('div');
  backdrop.className = 'tpl-backdrop';
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeTplModal(); });

  const modal = document.createElement('div');
  modal.className = 'tpl-modal';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'tpl-header';
  hdr.innerHTML = `
    <div class="tpl-header-left">
      <h2>📚 Biblioteca de Diseños Termodinámicos</h2>
      <p>Ejemplos resueltos y plantillas para el simulador de ciclos</p>
    </div>
    <button class="tpl-close" id="tpl-close-btn">✕</button>
  `;

  // Tabs
  const tabs = document.createElement('div');
  tabs.className = 'tpl-tabs';
  tabs.innerHTML = `
    <button class="tpl-tab ${activeTab==='examples'?'active':''}" data-tab="examples">✅ Ejemplos Resueltos</button>
    <button class="tpl-tab ${activeTab==='templates'?'active':''}" data-tab="templates">🔧 Plantillas</button>
  `;

  // Body
  const body = document.createElement('div');
  body.className = 'tpl-body';

  function renderTab(tab) {
    activeTab = tab;
    tabs.querySelectorAll('.tpl-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    body.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'tpl-grid';
    const items = tab === 'examples' ? EXAMPLES : TEMPLATES;
    items.forEach(item => grid.appendChild(buildCard(item)));
    body.appendChild(grid);

    if (tab === 'examples') {
      const note = document.createElement('div');
      note.style.cssText = 'margin-top:12px;padding:8px 12px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:11px;color:#166534;';
      note.innerHTML = '✅ <strong>Cómo usar:</strong> Cargue el ejemplo → cambie a modo <strong>"Analizar"</strong> para ver todos los estados termodinámicos resueltos. Los valores pre-calculados aparecerán en azul en los medidores.';
      body.appendChild(note);
    } else {
      const note = document.createElement('div');
      note.style.cssText = 'margin-top:12px;padding:8px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:11px;color:#1e40af;';
      note.innerHTML = '🔧 <strong>Plantillas:</strong> Topología predefinida con condiciones parciales. Ingrese las condiciones faltantes en los medidores (modo Analizar) para completar el análisis.';
      body.appendChild(note);
    }
  }

  tabs.querySelectorAll('.tpl-tab').forEach(t => {
    t.addEventListener('click', () => renderTab(t.dataset.tab));
  });

  modal.appendChild(hdr);
  modal.appendChild(tabs);
  modal.appendChild(body);
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  tplModalEl = backdrop;

  document.getElementById('tpl-close-btn').addEventListener('click', closeTplModal);
  renderTab(activeTab);

  function onEsc(e) { if (e.key==='Escape') { closeTplModal(); document.removeEventListener('keydown', onEsc); } }
  document.addEventListener('keydown', onEsc);
}

function closeTplModal() {
  if (tplModalEl) { tplModalEl.remove(); tplModalEl = null; }
}

/* ── Inyectar botones en el header ── */
function injectHeaderButtons() {
  const modeBar = document.querySelector('.app-header .mode-bar');
  if (!modeBar || document.getElementById('ej-btn')) return;

  // Botón de Ejemplos y Plantillas
  const ejBtn = document.createElement('button');
  ejBtn.id = 'ej-btn';
  ejBtn.textContent = '📚 Ejemplos';
  ejBtn.title = 'Abrir biblioteca: ejemplos resueltos y plantillas de ciclos (Ctrl+E)';
  ejBtn.addEventListener('click', openTplModal);
  modeBar.insertBefore(ejBtn, modeBar.firstChild);

  // Botón de impresión
  const printBtn = document.createElement('button');
  printBtn.id = 'print-btn';
  printBtn.textContent = '🖨️';
  printBtn.title = 'Imprimir / Exportar PDF';
  printBtn.addEventListener('click', () => window.print());
  modeBar.insertBefore(printBtn, modeBar.firstChild);
}

/* ── COP automático para ciclos de refrigeración ── */
function tryInjectCOP() {
  document.querySelectorAll('.summary-card').forEach(card => {
    if (card.querySelector('.cop-panel')) return;
    const rows = card.querySelectorAll('.summary-row');
    let qOut = null, wComp = null;
    rows.forEach(row => {
      const val = parseFloat((row.querySelector('strong')||{}).textContent||'');
      if (!isNaN(val)) {
        if (/calor cedido/i.test(row.textContent)) qOut = Math.abs(val);
        if (/potencia.*compresor|potencia consumida/i.test(row.textContent)) wComp = Math.abs(val);
      }
    });
    if (qOut!=null && wComp!=null && wComp>0 && qOut>wComp) {
      const cop_r = qOut/wComp, cop_hp = (qOut+wComp)/wComp;
      const panel = document.createElement('div');
      panel.className = 'cop-panel';
      panel.innerHTML = `
        <div class="cop-title">❄️ Coeficiente de Rendimiento (COP)</div>
        <div class="cop-row highlight"><span>COP refrigerador = Q_L/W</span><strong>${cop_r.toFixed(3)}</strong></div>
        <div class="cop-row"><span>COP bomba calor = Q_H/W</span><strong>${cop_hp.toFixed(3)}</strong></div>
        <div class="cop-row"><span>Verificación: COP_HP − COP_R</span><strong>${(cop_hp-cop_r).toFixed(3)} ≈ 1 ✓</strong></div>
      `;
      card.insertBefore(panel, card.firstChild);
    }
  });
}

/* ── MutationObserver ── */
const obs = new MutationObserver(() => {
  if (document.querySelector('.app-header .mode-bar')) injectHeaderButtons();
  tryInjectCOP();
});
obs.observe(document.body, {childList:true, subtree:true});
setTimeout(injectHeaderButtons, 500);
setTimeout(injectHeaderButtons, 1500);

/* ── Atajos de teclado ── */
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key==='e') { e.preventDefault(); openTplModal(); }
});

console.log('[CyclePad v2] Módulo cargado. Ctrl+E = Ejemplos/Plantillas.');
})();

</script>

(function () {
'use strict';

/* ── State ── */
let sensEl = null;
let analyses = [];     // [{id, xLabel, yLabel, xUnit, yUnit, points, title}]
let activeId = null;
let runCount = 0;

/* ════════════════════════════════════
   DISEÑO Y SOLVER
   ════════════════════════════════════ */
function getDesign() {
  if (typeof window.__cpGetDesign === 'function') {
    return window.__cpGetDesign();
  }
  return null;
}

function solveWith(design, modNodes, modEdges) {
  try {
    if (typeof window.__cpI8 !== 'function') return null;
    if (design.isSystem) {
      return window.__cpA8(modNodes, modEdges, design.substance, design.mass != null ? design.mass : 1);
    } else {
      return window.__cpI8(modNodes, modEdges, design.substance, design.isClosed, design.mdot);
    }
  } catch (e) { return null; }
}

/* ════════════════════════════════════
   PARÁMETROS DISPONIBLES
   ════════════════════════════════════ */
function getDepParams() {
  const res = window.__cpLastResult;
  if (!res) return [];
  const opts = [];
  // CICLO — summary
  if (res.summary && typeof res.summary === 'object') {
    for (const [k, v] of Object.entries(res.summary)) {
      if (typeof v === 'number' && isFinite(v)) {
        opts.push({ value: 'summary:' + k, label: 'CICLO · ' + k });
      }
    }
  }
  // Estados — T, P, h, s, x
  if (res.statesByEdge) {
    const labels = res.labels || {};
    for (const [edgeId, state] of Object.entries(res.statesByEdge)) {
      const lbl = labels[edgeId] || edgeId;
      for (const [field, fLabel] of [['T','T'],['P','P'],['h','h'],['s','s'],['x','x']]) {
        const val = state[field];
        if (val != null && typeof val === 'number' && isFinite(val)) {
          opts.push({ value: 'state:' + edgeId + ':' + field, label: lbl + ' · ' + fLabel });
        }
      }
    }
  }
  return opts;
}

function getIndepParams() {
  const design = getDesign();
  if (!design) return [];
  const res = window.__cpLastResult;
  const labels = res?.labels || {};
  const opts = [];

  // Condiciones de borde (T o P numérico en cond)
  for (const edge of (design.edges || [])) {
    const lbl = labels[edge.id] || edge.id;
    const cond = edge.cond || {};
    if (cond.T !== '' && cond.T != null && !isNaN(Number(cond.T))) {
      opts.push({ value: 'edge:' + edge.id + ':T', label: lbl + ' · T' });
    }
    if (cond.P !== '' && cond.P != null && !isNaN(Number(cond.P))) {
      opts.push({ value: 'edge:' + edge.id + ':P', label: lbl + ' · P' });
    }
    if (cond.x !== '' && cond.x != null && !isNaN(Number(cond.x)) && cond.phase === 'sat') {
      opts.push({ value: 'edge:' + edge.id + ':x', label: lbl + ' · x (calidad)' });
    }
  }

  // Parámetros de nodo (r, n para politrópicos)
  for (const node of (design.nodes || [])) {
    if (['POLY_COMPRESSION','POLY_EXPANSION'].includes(node.type)) {
      const p = node.params || {};
      if (p.r !== '' && p.r != null && !isNaN(Number(p.r))) {
        opts.push({ value: 'node:' + node.id + ':r', label: (node.name || node.id) + ' · r (razón compresión)' });
      }
      if (p.n !== '' && p.n != null && !isNaN(Number(p.n))) {
        opts.push({ value: 'node:' + node.id + ':n', label: (node.name || node.id) + ' · n (politrópico)' });
      }
    }
  }
  return opts;
}

/* ════════════════════════════════════
   EXTRACCIÓN DEL PARÁMETRO DEPENDIENTE
   ════════════════════════════════════ */
function extractDep(result, depKey) {
  if (!result) return null;
  if (depKey.startsWith('summary:')) {
    const k = depKey.slice(8);
    const v = result.summary?.[k];
    return (v != null && isFinite(v)) ? v : null;
  }
  if (depKey.startsWith('state:')) {
    const parts = depKey.split(':');
    const edgeId = parts[1], field = parts[2];
    const v = result.statesByEdge?.[edgeId]?.[field];
    return (v != null && isFinite(v)) ? v : null;
  }
  return null;
}

/* ════════════════════════════════════
   BARRIDO PARAMÉTRICO
   ════════════════════════════════════ */
async function runAnalysis() {
  const design = getDesign();
  if (!design) { alert('El ciclo no está analizado. Cambie a modo Analizar primero.'); return; }
  if (!window.__cpI8) { alert('Solver no disponible. Recargue la página.'); return; }

  const modal = sensEl;
  const depSel  = modal.querySelector('#sa-dep');
  const indSel  = modal.querySelector('#sa-ind');
  const fromIn  = modal.querySelector('#sa-from');
  const toIn    = modal.querySelector('#sa-to');
  const ptIn    = modal.querySelector('#sa-pts');
  const incIn   = modal.querySelector('#sa-inc');
  const useInc  = modal.querySelector('#sa-use-inc');
  const statusEl= modal.querySelector('.sens-status');
  const progBar = modal.querySelector('.sens-progress');
  const progFill= modal.querySelector('.sens-progress-bar');
  const runBtn  = modal.querySelector('.sens-btn-run');

  const depKey  = depSel.value;
  const indKey  = indSel.value;
  const from    = parseFloat(fromIn.value);
  const to      = parseFloat(toIn.value);

  if (!depKey || !indKey) { alert('Seleccione parámetros dependiente e independiente.'); return; }
  if (isNaN(from) || isNaN(to) || from >= to) { alert('Rango inválido (Desde < Hasta).'); return; }

  let N;
  if (useInc.checked) {
    const inc = parseFloat(incIn.value);
    if (isNaN(inc) || inc <= 0) { alert('Incremento inválido.'); return; }
    N = Math.round((to - from) / inc) + 1;
    if (N > 200) N = 200;
  } else {
    N = Math.max(2, Math.min(200, parseInt(ptIn.value) || 25));
  }

  runBtn.disabled = true;
  progBar.style.display = 'block';
  progFill.style.width = '0%';
  statusEl.textContent = 'Calculando…';

  const points = [];
  let skipped = 0;

  await new Promise(resolve => {
    let i = 0;
    function step() {
      if (i >= N) { resolve(); return; }
      const x = from + (i / (N - 1)) * (to - from);

      // Clonar y modificar
      let modNodes = design.nodes;
      let modEdges = design.edges;

      if (indKey.startsWith('edge:')) {
        const [, edgeId, field] = indKey.split(':');
        modEdges = design.edges.map(e =>
          e.id === edgeId ? { ...e, cond: { ...e.cond, [field]: String(x) } } : e
        );
      } else if (indKey.startsWith('node:')) {
        const [, nodeId, param] = indKey.split(':');
        modNodes = design.nodes.map(n =>
          n.id === nodeId ? { ...n, params: { ...n.params, [param]: x } } : n
        );
      }

      const result = solveWith(design, modNodes, modEdges);
      const y = extractDep(result, depKey);
      if (y !== null && isFinite(y)) {
        points.push({ x, y });
      } else {
        skipped++;
      }

      i++;
      const pct = Math.round((i / N) * 100);
      progFill.style.width = pct + '%';
      statusEl.textContent = `Calculando… ${pct}%`;
      setTimeout(step, 0);  // yield to browser
    }
    step();
  });

  runBtn.disabled = false;
  progBar.style.display = 'none';

  if (points.length === 0) {
    statusEl.textContent = 'Sin resultados válidos.';
    alert('El análisis no produjo resultados válidos. Verifique el rango del parámetro independiente.');
    return;
  }

  const depLabel  = depSel.options[depSel.selectedIndex]?.text || depKey;
  const indLabel  = indSel.options[indSel.selectedIndex]?.text || indKey;
  const id = ++runCount;
  const analysis = { id, points, xLabel: indLabel, yLabel: depLabel, skipped };
  analyses.push(analysis);
  activeId = id;

  refreshList();
  drawChart(analysis);
  statusEl.textContent = `Análisis #${id}: ${points.length} puntos${skipped ? ', ' + skipped + ' omitidos' : ''}`;
}

/* ════════════════════════════════════
   GRÁFICA (canvas nativo)
   ════════════════════════════════════ */
function drawChart(analysis) {
  const wrapper = sensEl?.querySelector('.sens-chart-wrapper');
  if (!wrapper) return;
  wrapper.innerHTML = '';

  if (!analysis || analysis.points.length === 0) {
    wrapper.innerHTML = '<div class="sens-chart-placeholder">Sin datos para mostrar.</div>';
    return;
  }

  const W = wrapper.clientWidth || 750, H = 260;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  wrapper.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  const pad = { top: 28, right: 24, bottom: 52, left: 64 };
  const pw = W - pad.left - pad.right;
  const ph = H - pad.top - pad.bottom;

  const xs = analysis.points.map(p => p.x);
  const ys = analysis.points.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const xRange = xMax - xMin || 1;
  const yPad = (yMax - yMin) * 0.08 || Math.abs(yMax) * 0.05 || 1;
  const y0 = yMin - yPad, y1 = yMax + yPad;
  const yRange = y1 - y0;

  const toCanvasX = x => pad.left + ((x - xMin) / xRange) * pw;
  const toCanvasY = y => pad.top + ph - ((y - y0) / yRange) * ph;

  // ── Background ──
  ctx.fillStyle = '#fafafe';
  ctx.fillRect(0, 0, W, H);

  // ── Grid ──
  ctx.strokeStyle = '#e2e8f0';
  ctx.lineWidth = 1;
  const nGridY = 5;
  for (let i = 0; i <= nGridY; i++) {
    const y = y0 + (i / nGridY) * yRange;
    const cy = toCanvasY(y);
    ctx.beginPath(); ctx.moveTo(pad.left, cy); ctx.lineTo(pad.left + pw, cy); ctx.stroke();
  }
  const nGridX = 5;
  for (let i = 0; i <= nGridX; i++) {
    const x = xMin + (i / nGridX) * xRange;
    const cx = toCanvasX(x);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + ph); ctx.stroke();
  }

  // ── Axes ──
  ctx.strokeStyle = '#475569';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top + ph);
  ctx.lineTo(pad.left + pw, pad.top + ph);
  ctx.stroke();

  // ── Tick labels ──
  ctx.fillStyle = '#64748b';
  ctx.font = '11px system-ui, sans-serif';
  ctx.textAlign = 'center';
  for (let i = 0; i <= nGridX; i++) {
    const x = xMin + (i / nGridX) * xRange;
    const cx = toCanvasX(x);
    ctx.fillText(x.toFixed(2), cx, pad.top + ph + 14);
  }
  ctx.textAlign = 'right';
  for (let i = 0; i <= nGridY; i++) {
    const y = y0 + (i / nGridY) * yRange;
    const cy = toCanvasY(y);
    ctx.fillText(y.toFixed(2), pad.left - 6, cy + 4);
  }

  // ── Axis labels ──
  ctx.fillStyle = '#374151';
  ctx.font = 'bold 12px system-ui, sans-serif';
  ctx.textAlign = 'center';
  // X label
  const xShort = analysis.xLabel.length > 40 ? analysis.xLabel.slice(0, 38) + '…' : analysis.xLabel;
  ctx.fillText(xShort, pad.left + pw / 2, H - 6);
  // Y label (rotado)
  ctx.save();
  ctx.translate(13, pad.top + ph / 2);
  ctx.rotate(-Math.PI / 2);
  const yShort = analysis.yLabel.length > 40 ? analysis.yLabel.slice(0, 38) + '…' : analysis.yLabel;
  ctx.fillText(yShort, 0, 0);
  ctx.restore();

  // ── Título ──
  ctx.fillStyle = '#1e293b';
  ctx.font = 'bold 13px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Análisis de Sensibilidad #' + analysis.id, W / 2, 16);

  // ── Línea de datos ──
  ctx.strokeStyle = '#7c3aed';
  ctx.lineWidth = 2.2;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  analysis.points.forEach((p, i) => {
    const cx = toCanvasX(p.x), cy = toCanvasY(p.y);
    i === 0 ? ctx.moveTo(cx, cy) : ctx.lineTo(cx, cy);
  });
  ctx.stroke();

  // ── Puntos de datos ──
  ctx.fillStyle = '#7c3aed';
  analysis.points.forEach(p => {
    const cx = toCanvasX(p.x), cy = toCanvasY(p.y);
    ctx.beginPath();
    ctx.arc(cx, cy, 3.5, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── Tooltip en hover ──
  let tooltip = null;
  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    // Find nearest point
    let nearest = null, minD = Infinity;
    analysis.points.forEach(p => {
      const cx = toCanvasX(p.x), cy = toCanvasY(p.y);
      const d = Math.hypot(mx - cx, my - cy);
      if (d < minD) { minD = d; nearest = { p, cx, cy }; }
    });
    if (nearest && minD < 18) {
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.style.cssText = 'position:absolute;background:#1e293b;color:#fff;font-size:11px;padding:4px 8px;border-radius:5px;pointer-events:none;z-index:9999;white-space:nowrap';
        wrapper.style.position = 'relative';
        wrapper.appendChild(tooltip);
      }
      tooltip.textContent = `x = ${nearest.p.x.toFixed(3)}   y = ${nearest.p.y.toFixed(3)}`;
      tooltip.style.left = (nearest.cx + 6) + 'px';
      tooltip.style.top  = (nearest.cy - 20) + 'px';
      tooltip.style.display = 'block';
    } else if (tooltip) {
      tooltip.style.display = 'none';
    }
  });
  canvas.addEventListener('mouseleave', () => { if (tooltip) tooltip.style.display = 'none'; });
}

function refreshList() {
  const listEl = sensEl?.querySelector('.sens-list');
  if (!listEl) return;
  if (analyses.length === 0) {
    listEl.innerHTML = '<div class="sens-list-empty">Sin análisis realizados.</div>';
    return;
  }
  listEl.innerHTML = '';
  analyses.forEach(a => {
    const item = document.createElement('div');
    item.className = 'sens-list-item' + (a.id === activeId ? ' active' : '');
    item.innerHTML = `<span class="sens-item-dot"></span><span>#${a.id}: ${a.xLabel.slice(0, 30)} → ${a.yLabel.slice(0, 30)} (${a.points.length} pts)</span>`;
    item.addEventListener('click', () => {
      activeId = a.id;
      refreshList();
      drawChart(a);
    });
    listEl.appendChild(item);
  });
}

function exportCSV() {
  const a = analyses.find(x => x.id === activeId);
  if (!a) { alert('Seleccione un análisis de la lista.'); return; }
  const rows = [['x: ' + a.xLabel, 'y: ' + a.yLabel],
                ...a.points.map(p => [p.x.toFixed(6), p.y.toFixed(6)])];
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url; link.download = `sensibilidad_${a.id}.csv`; link.click();
  URL.revokeObjectURL(url);
}

function deleteActive() {
  analyses = analyses.filter(a => a.id !== activeId);
  if (analyses.length) { activeId = analyses[analyses.length - 1].id; drawChart(analyses.find(a => a.id === activeId)); }
  else { activeId = null; const w = sensEl?.querySelector('.sens-chart-wrapper'); if (w) w.innerHTML = '<div class="sens-chart-placeholder">📊 El gráfico aparecerá aquí.</div>'; }
  refreshList();
}

function clearAll() {
  if (!analyses.length) return;
  if (!confirm('¿Eliminar todos los análisis?')) return;
  analyses = []; activeId = null;
  const w = sensEl?.querySelector('.sens-chart-wrapper');
  if (w) w.innerHTML = '<div class="sens-chart-placeholder">📊 El gráfico aparecerá aquí.</div>';
  refreshList();
}

/* ════════════════════════════════════
   MODAL UI
   ════════════════════════════════════ */
function openSens() {
  if (sensEl) { sensEl.remove(); sensEl = null; }

  const design = getDesign();
  const depParams  = getDepParams();
  const indepParams = getIndepParams();

  const backdrop = document.createElement('div');
  backdrop.className = 'sens-backdrop';
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeSens(); });

  const modal = document.createElement('div');
  modal.className = 'sens-modal';

  // ── Header ──
  modal.innerHTML = `
  <div class="sens-hdr">
    <div><h2>📊 Análisis de Sensibilidad</h2>
    <p>Cómo varía un parámetro del ciclo al cambiar una condición del diseño</p></div>
    <button class="sens-close-btn" id="sens-close-x">✕</button>
  </div>
  <div class="sens-body">
    <div class="sens-panels">
      <!-- Dependiente -->
      <div class="sens-panel">
        <div class="sens-panel-title">Parámetro Dependiente (observar)</div>
        <div class="sens-field">
          <label for="sa-dep">Parámetro a observar</label>
          <select id="sa-dep" class="sens-select">
            <option value="">— Seleccionar —</option>
            ${depParams.map(o => `<option value="${encodeURIComponent(o.value)}">${o.label}</option>`).join('')}
          </select>
        </div>
        ${depParams.length === 0 ? '<p style="font-size:11px;color:#ef4444;margin:0">⚠ Analice el ciclo primero (modo Analizar).</p>' : ''}
      </div>
      <!-- Independiente -->
      <div class="sens-panel">
        <div class="sens-panel-title">Parámetro Independiente (variar)</div>
        <div class="sens-field">
          <label for="sa-ind">Parámetro a variar</label>
          <select id="sa-ind" class="sens-select">
            <option value="">— Seleccionar —</option>
            ${indepParams.map(o => `<option value="${encodeURIComponent(o.value)}">${o.label}</option>`).join('')}
          </select>
        </div>
        <div class="sens-field">
          <div class="sens-range-row">
            <div>
              <label for="sa-from">Desde</label>
              <input id="sa-from" type="number" class="sens-input" value="0" step="any">
            </div>
            <div>
              <label for="sa-to">Hasta</label>
              <input id="sa-to" type="number" class="sens-input" value="100" step="any">
            </div>
          </div>
        </div>
        <div class="sens-radio-row">
          <label><input type="radio" name="sa-mode" id="sa-use-inc"> Incremento</label>
          <input id="sa-inc" type="number" class="sens-input" value="10" step="any" style="width:70px">
          <label><input type="radio" name="sa-mode" id="sa-use-pts" checked> N° puntos</label>
          <input id="sa-pts" type="number" class="sens-input" value="25" min="2" max="200" style="width:60px">
        </div>
      </div>
    </div>
    <!-- Lista análisis -->
    <div class="sens-list-section">
      <div class="sens-list-title">Análisis realizados</div>
      <div class="sens-list"><div class="sens-list-empty">Sin análisis realizados.</div></div>
    </div>
    <!-- Progreso -->
    <div class="sens-progress"><div class="sens-progress-bar"></div></div>
    <!-- Gráfica -->
    <div class="sens-chart-section">
      <div class="sens-chart-wrapper">
        <div class="sens-chart-placeholder">📊 El gráfico aparecerá aquí tras ejecutar un análisis.</div>
      </div>
    </div>
  </div>
  <div class="sens-footer">
    <button class="sens-btn-run" id="sa-run-btn">▶ Ejecutar</button>
    <button class="sens-btn-sec" id="sa-del-btn">Borrar</button>
    <button class="sens-btn-danger" id="sa-clr-btn">Limpiar todo</button>
    <button class="sens-btn-sec" id="sa-exp-btn">⬇ Exportar CSV</button>
    <span class="sens-status">Listo.</span>
    <button class="sens-btn-sec" id="sa-cls-btn">Cerrar</button>
  </div>`;

  // Fix option values (decode)
  modal.querySelectorAll('#sa-dep option, #sa-ind option').forEach(opt => {
    if (opt.value) opt.value = decodeURIComponent(opt.value);
  });

  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  sensEl = backdrop;

  // Events
  modal.querySelector('#sens-close-x').addEventListener('click', closeSens);
  modal.querySelector('#sa-cls-btn').addEventListener('click', closeSens);
  modal.querySelector('#sa-run-btn').addEventListener('click', runAnalysis);
  modal.querySelector('#sa-del-btn').addEventListener('click', deleteActive);
  modal.querySelector('#sa-clr-btn').addEventListener('click', clearAll);
  modal.querySelector('#sa-exp-btn').addEventListener('click', exportCSV);

  // Auto-fill From/To when independent param changes
  modal.querySelector('#sa-ind').addEventListener('change', function () {
    const key = this.value;
    if (!key) return;
    const design = getDesign();
    if (!design) return;
    let defVal = null;
    if (key.startsWith('edge:')) {
      const [, edgeId, field] = key.split(':');
      const edge = design.edges.find(e => e.id === edgeId);
      defVal = edge?.cond?.[field];
    } else if (key.startsWith('node:')) {
      const [, nodeId, param] = key.split(':');
      const node = design.nodes.find(n => n.id === nodeId);
      defVal = node?.params?.[param];
    }
    if (defVal != null && !isNaN(Number(defVal))) {
      const center = Number(defVal);
      const delta = Math.max(center * 0.3, 50);
      modal.querySelector('#sa-from').value = +(center - delta).toFixed(3);
      modal.querySelector('#sa-to').value = +(center + delta).toFixed(3);
    }
  });

  // Radio buttons
  modal.querySelector('#sa-use-inc').addEventListener('change', () => {
    modal.querySelector('#sa-inc').disabled = false;
    modal.querySelector('#sa-pts').disabled = true;
  });
  modal.querySelector('#sa-use-pts').addEventListener('change', () => {
    modal.querySelector('#sa-inc').disabled = true;
    modal.querySelector('#sa-pts').disabled = false;
  });
  modal.querySelector('#sa-inc').disabled = true;

  // Restore prior analyses
  refreshList();
  if (activeId) {
    const a = analyses.find(x => x.id === activeId);
    if (a) drawChart(a);
  }

  // Escape key
  function onEsc(e) { if (e.key === 'Escape') { closeSens(); document.removeEventListener('keydown', onEsc); } }
  document.addEventListener('keydown', onEsc);
}

function closeSens() {
  if (sensEl) { sensEl.remove(); sensEl = null; }
}

/* ════════════════════════════════════
   INYECCIÓN DEL BOTÓN
   ════════════════════════════════════ */
function injectSensButton() {
  const modeBar = document.querySelector('.app-header .mode-bar');
  if (!modeBar || document.getElementById('sens-btn')) return;
  const btn = document.createElement('button');
  btn.id = 'sens-btn';
  btn.textContent = '📊 Sensibilidad';
  btn.title = 'Análisis de Sensibilidad — cómo los parámetros del ciclo responden a cambios en las condiciones (Ctrl+Shift+S)';
  btn.addEventListener('click', openSens);
  // Insertar después de #ej-btn
  const ejBtn = document.getElementById('ej-btn');
  if (ejBtn && ejBtn.nextSibling) {
    modeBar.insertBefore(btn, ejBtn.nextSibling);
  } else {
    modeBar.insertBefore(btn, modeBar.firstChild);
  }
}

const sensObs = new MutationObserver(injectSensButton);
sensObs.observe(document.body, { childList: true, subtree: true });
setTimeout(injectSensButton, 600);
setTimeout(injectSensButton, 1800);

document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.shiftKey && e.key === 'S') { e.preventDefault(); openSens(); }
});

console.log('[CyclePad Sens] Módulo cargado. Ctrl+Shift+S = Análisis de Sensibilidad.');
})();
